          VideoToolbox,
          Virtualization,
          Vision,
          VisionKit,
          # WebKit,  -- exceed max arg
          WidgetKit,
          iTunesLibrary,
          vmnet
        ]
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build  --manifest-path=crates/apple-sys/Cargo.toml --verbose --features ${{ matrix.feature }}

  prebuilt-examples:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - name: Build examples
      run: >
        cargo build --manifest-path=crates/apple-sys/Cargo.toml
        --no-default-features
