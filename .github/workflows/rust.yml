name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  bindgen:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - name: Test
      run: cargo test  --manifest-path=crates/apple-bindgen/Cargo.toml --verbose
    - name: Tool
      run: cargo run --features=bin --manifest-path=crates/apple-bindgen/Cargo.toml --verbose -- generate CoreFoundation --sdk macosx

  sys-macos:
    strategy:
      matrix:
        feature: [
          AVFAudio,
          AVFoundation,
          AVKit,
          AVRouting,
          Accelerate,
          Accessibility,
          Accounts,
          AdServices,
          AdSupport,
          AddressBook,
          AppKit,
          AppTrackingTransparency,
          AppleScriptKit,
          AppleScriptObjC,
          ApplicationServices,
          AudioToolbox,
          AudioUnit,
          AudioVideoBridging,
          AuthenticationServices,
          AutomaticAssessmentConfiguration,
          Automator,
          BackgroundAssets,
          BackgroundTasks,
          BusinessChat,
          CFNetwork,
          CalendarStore,
          CallKit,
          Carbon,
          ClassKit,
          CloudKit,
          Cocoa,
          Collaboration,
          ColorSync,
          Contacts,
          ContactsUI,
          CoreAudio,
          CoreAudioKit,
          CoreBluetooth,
          CoreData,
          CoreFoundation,
          CoreGraphics,
