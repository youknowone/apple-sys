          NaturalLanguage,
          NearbyInteraction,
          NetFS,
          Network,
          NetworkExtension,
          NotificationCenter,
          OSAKit,
          OSLog,
          OpenAL,
          OpenCL,
          OpenDirectory,
          OpenGL,
          PCSC,
